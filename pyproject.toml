[project]
name = "ml-playground"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
license = "GPL-3.0-only"
authors = [{ name = "NextFire", email = "git@yuru.moe" }]
requires-python = ">=3.14"
dependencies = [
    "accelerate==1.13.0",
    "datasets==4.8.4",
    "huggingface-hub==1.9.0",
    "torch==2.11.0",
    "torchcodec==0.11.0",
    "trackio[gpu]==0.20.2",
    "transformers==5.5.0",
]

[dependency-groups]
dev = ["ipykernel==7.2.0", "ipywidgets==8.1.8"]

[build-system]
requires = ["uv_build>=0.11.4,<0.12.0"]
build-backend = "uv_build"
